<svg width="200" height="60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="100%" height="100%" fill="rgba(255,255,255,0.15)" rx="8" ry="8"/>
  
  <!-- Logo text -->
  <text x="50%" y="40%" font-family="Arial, sans-serif" font-size="20" 
        font-weight="bold" text-anchor="middle" dominant-baseline="middle" 
        fill="url(#logoGradient)">
    Codentra
  </text>
  
  <!-- Copyright text -->
  <text x="50%" y="65%" font-family="Arial, sans-serif" font-size="10" 
        text-anchor="middle" dominant-baseline="middle" 
        fill="rgba(255,255,255,0.7)">
    © 2026
  </text>
</svg>
